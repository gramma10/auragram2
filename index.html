<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraGram | Architects of Digital Aura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        midnight: '#000000',
                        royal: '#3533cd',
                        silver: '#ffffff',
                        charcoal: '#4c4c4c'
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-midnight text-white font-sans selection:bg-royal selection:text-white antialiased;
                overflow-x: hidden;
            }

            ::-webkit-scrollbar {
                width: 4px;
            }

            ::-webkit-scrollbar-track {
                background: #000;
            }

            ::-webkit-scrollbar-thumb {
                background: #3533cd;
                border-radius: 10px;
            }
        }

        .aura-mesh {
            background: radial-gradient(at 10% 10%, rgba(53, 51, 205, 0.2) 0, transparent 40%),
                radial-gradient(at 90% 90%, rgba(255, 255, 255, 0.05) 0, transparent 40%);
            filter: blur(100px);
        }

        .glass {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid rgba(53, 51, 205, 0.1);
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .hero-title-gradient {
            background: linear-gradient(180deg, #FFFFFF 0%, #3533cd 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Only hide cursor on devices with a mouse pointer */
        @media (pointer: fine) {
            body {
                cursor: none;
            }
            a,
            button,
            input,
            textarea {
                cursor: none !important;
            }
        }
    </style>
    <script type="importmap">

    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
</head>

<body>

          var v = d.createElement(t), s = d.getElementsByTagName(t)[0];

      })(document, 'script');

</html>
